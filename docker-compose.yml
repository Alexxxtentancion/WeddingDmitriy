services:
  api:
    build: ./backend
    volumes:
      - ./backend/data:/app/data
    env_file: .env
    environment:
      - CSV_PATH=/app/data/rsvp.csv
    restart: unless-stopped

  web:
    build:
      context: ./frontend
      args:
        VITE_YANDEX_MAPS_KEY: ${VITE_YANDEX_MAPS_KEY}
    ports:
      - "80:80"
    depends_on:
      - api
    restart: unless-stopped
